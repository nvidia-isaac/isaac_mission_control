robots:
  - name: "carter01"
    labels: ["test", "carter", "ros"]
    heartbeat_timeout: 30

services:
  waypoint_graph:
    base_url: "http://127.0.0.1:8000"
  mission_database:
    base_url: "http://127.0.0.1:5003"
  mission_dispatch:
    base_url: "http://127.0.0.1:5002"
    default_mission_timeout: 900
  cuopt:
    base_url: "http://127.0.0.1:5050"
    solve_parameters:
      time_limit: .5
      verbose_mode: False

map:
  map_file: "/tmp/config/carter_warehouse_navigation.png"
  metadata_yaml: "/tmp/config/carter_warehouse_navigation.yaml"

  metadata:
    map_id: "galileo_hubble"
    resolution: 0.05
    occupancy_threshold: 206
    x_offset: 0.0
    y_offset: 0.0
    rotation: 0.0
    safety_distance: 0.45

  push_map_on_startup: False
  
constants:
  MIN_BATTERY: 0.0

telemetry:
  SEND_TELEMETRY: False
  TELEMETRY_ID: ""
  TELEMETRY_SECRET: ""
  TELEMETRY_ENV: "DEV" # {DEV | TEST | PROD}
